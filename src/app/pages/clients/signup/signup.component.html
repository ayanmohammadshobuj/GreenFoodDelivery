<div class="parent">
    <img src="https://i.postimg.cc/MTRK7Thf/bg-form.jpg" alt="">
    <div class="container">
        <form [formGroup]="formValue">
            <h1>Sign Up</h1>
            <div class="input-box">
                <input type="text" name="fullName" placeholder="Full Name" formControlName="fullName">
                <i class='bx bx-envelope'></i>
            </div>

            <div class="input-box">
                <input type="text" name="email" placeholder="Email" formControlName="email">
                <i class='bx bx-envelope'></i>
            </div>

            <div class="input-box">
                <input type="text" name="mobile" placeholder="Mobile Number" formControlName="mobile">
                <i class='bx bx-envelope'></i>
            </div>

            <div class="input-box">
                <input type="password" name="password" placeholder="Password (At least 8 charracters)" formControlName="password">
                <i class='bx bx-lock-alt'></i>
            </div>
            <div class="remember">
                <label for="t&c">
                    <input type="checkbox" name="terms" id="t&c"> Accept <a href="#">terms and conditions.</a> 
                </label>
            </div>
            <button type="button" class="btn" (click)="onSignUp()">Sign Up</button>
            <br><br>
            <hr>
            
            <button type="submit" class="btn2">Sign Up with Google</button>
            <button type="submit" class="btn3">Sign Up with Facebook</button>

            <div class="login">
                <p>Already have an account? <br> <a (click)="goLogin()">Login</a></p>
            </div>
        </form>
    </div>
</div>
